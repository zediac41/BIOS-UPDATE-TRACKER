name: Build & Push /docs

on:
  schedule:
    # 7:00 AM Central during daylight saving time (12:00 UTC).
    # Change to 13:00 UTC when Central Standard Time returns.
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write     # needed to commit/push docs when generated files change
  pages: write        # needed for actions/deploy-pages
  id-token: write     # OIDC for pages deploy

concurrency:
  group: bios-tracker-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build site
        shell: bash
        run: |
          set -e
          mkdir -p docs
          # If your CSS lives at assets/site.css or site.css, copy it into /docs:
          mkdir -p docs/assets
          if [ -f assets/site.css ]; then cp -f assets/site.css docs/assets/site.css; fi
          if [ -f site.css ]; then cp -f site.css docs/assets/site.css; fi

          xvfb-run -a python bios_tracker.py

          touch docs/.nojekyll

      - name: Commit & push /docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Rebuild: updated generated pages"
            git push
          fi

      # Deploy via GitHub Pages action (works if your Pages source is set to "GitHub Actions")
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
