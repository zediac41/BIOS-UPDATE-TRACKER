name: Build & Push /docs

on:
  schedule:
    - cron: '22 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bios-tracker-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build site
        shell: bash
        run: |
          set -e
          mkdir -p docs
          # If your CSS lives at assets/site.css or site.css, copy it into /docs:
          mkdir -p docs/assets
          if [ -f assets/site.css ]; then cp -f assets/site.css docs/assets/site.css; fi
          if [ -f site.css ]; then cp -f site.css docs/assets/site.css; fi

          xvfb-run -a python bios_tracker.py

          touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download generated site
        uses: actions/download-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/pages

      - name: Restore generated /docs
        shell: bash
        run: |
          rm -rf docs
          mkdir -p docs
          tar -xf "$RUNNER_TEMP/pages/artifact.tar" -C docs

      - name: Commit & push /docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Rebuild: updated generated pages"
            git push
          fi
