name: Build & Push /docs

on:
  schedule:
    # 7:00 AM Central during daylight saving time (12:00 UTC).
    # Change to 13:00 UTC when Central Standard Time returns.
    - cron: '17 09 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bios-tracker-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build site
        shell: bash
        run: |
          set -e
          mkdir -p docs
          # If your CSS lives at assets/site.css or site.css, copy it into /docs:
          mkdir -p docs/assets
          if [ -f assets/site.css ]; then cp -f assets/site.css docs/assets/site.css; fi
          if [ -f site.css ]; then cp -f site.css docs/assets/site.css; fi

          xvfb-run -a python bios_tracker.py

          touch docs/.nojekyll

      - name: Commit & push /docs
        id: commit
        run: |
          echo "committed=false" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Rebuild: updated generated pages"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deployment
        if: steps.commit.outputs.committed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
